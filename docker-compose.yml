# 根目錄 docker-compose.yml（移除 version:，保持简洁）
networks:
  ntn_net:
    driver: bridge

volumes:
  postgres_data:

services:
  postgis_db:
    image: postgis/postgis:16-3.4
    container_name: postgis_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ntn_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: uav_ntn_base:latest
    container_name: fastapi_srv
    volumes:
      - ./backend:/workspace/backend
      - ./ueransim-config:/workspace/config
    env_file:
      - .env
    networks:
      - ntn_net
    ports:
      - "8000:8000"
    depends_on:
      postgis_db:
        condition: service_healthy

  skyfield_srv:
    image: uav_ntn_base:latest
    container_name: skyfield_srv
    command: ["python", "-m", "backend.app.services.skyfield_worker"]
    env_file:
      - .env
    networks:
      - ntn_net
    depends_on:
      - backend

  sat_gnb:
    image: uav_ntn_base:latest
    container_name: sat_gnb
    command:
      - "/workspace/ueransim/nr-gnb"
      - "-c"
      - "/workspace/config/sat_gnb.yaml"
    networks:
      - ntn_net
    depends_on:
      - backend

  uav_ue:
    image: uav_ntn_base:latest
    container_name: uav_ue
    command:
      - "/workspace/ueransim/nr-ue"
      - "-c"
      - "/workspace/config/uav_ue.yaml"
    networks:
      - ntn_net
    depends_on:
      - sat_gnb

  react_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks:
      - ntn_net
    depends_on:
      - backend
